# PhantomProxy — minimal (proxy + Go API only)
services:
  phantom-proxy:
    build: .
    ports:
      - "443:443"
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./configs:/app/configs
      - proxy_data:/data
    environment:
      PHANTOM_DATABASE_PATH: /data/phantom.db
volumes:
  proxy_data:
