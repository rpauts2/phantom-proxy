# Kubernetes Helm Chart for PhantomProxy v14.0

apiVersion: v2
name: phantomproxy
description: Enterprise Red Team Platform
type: application
version: 14.0.0
appVersion: "14.0.0"

keywords:
  - security
  - phishing
  - red-team
  - penetration-testing

maintainers:
  - name: PhantomSec Labs
    email: dev@phantomseclabs.com

dependencies:
  - name: postgresql
    version: 12.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
