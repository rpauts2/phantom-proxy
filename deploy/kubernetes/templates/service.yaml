apiVersion: v1
kind: Service
metadata:
  name: {{ include "phantomproxy.fullname" . }}
  labels:
    {{- include "phantomproxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
    - port: {{ .Values.config.apiPort }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "phantomproxy.selectorLabels" . | nindent 4 }}
