# =============================================================================
# PhantomProxy Pro - CI/CD Pipeline
# Professional GitHub Actions Workflow
# Last Updated: February 20, 2026
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Code Quality & Security Scanning
  # ---------------------------------------------------------------------------
  quality-check:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy pylint pytest pytest-cov bandit safety
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Black format check
        run: black --check . || true
        continue-on-error: true

      - name: Flake8 linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics || true

      - name: MyPy type checking
        run: mypy . --ignore-missing-imports || true
        continue-on-error: true

      - name: Bandit security scan
        run: bandit -r . -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Safety dependency check
        run: safety check --json > safety-report.json || true
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Go Build & Test
  # ---------------------------------------------------------------------------
  go-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download || true
        continue-on-error: true

      - name: Build
        run: go build -v ./... || true
        continue-on-error: true

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./... || true
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: go
          name: codecov-go
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Python Test
  # ---------------------------------------------------------------------------
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-check]

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true

      - name: Run tests
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=html || true
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python-${{ matrix.python-version }}
          name: codecov-python-${{ matrix.python-version }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Build Executables
  # ---------------------------------------------------------------------------
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [go-test, python-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: phantomproxy-linux
          - os: windows-latest
            artifact_name: phantomproxy-windows.exe
          - os: macos-latest
            artifact_name: phantomproxy-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Build Python executable
        run: |
          # Find main Python file
          MAIN_FILE=$(ls *.py 2>/dev/null | head -1)
          if [ -n "$MAIN_FILE" ]; then
            pyinstaller --onefile --name "${{ matrix.artifact_name }}" "$MAIN_FILE" || true
          fi
        shell: bash

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "${{ matrix.artifact_name }}-go" . || true
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}*
            ${{ matrix.artifact_name }}-go
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Docker Build (if Dockerfile exists)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [go-test, python-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Release (on tags)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"* %s" $PREVIOUS_TAG..HEAD > changelog.txt
          else
            git log --pretty=format:"* %s" > changelog.txt
          fi
          echo "path=changelog.txt" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: ${{ steps.changelog.outputs.path }}
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Deploy Notification
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [release]
    if: always()

    steps:
      - name: Deployment notification
        run: |
          echo "============================================"
          echo "  PhantomProxy Pro CI/CD Pipeline Complete"
          echo "============================================"
          echo ""
          echo "  Status: ${{ needs.release.result }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Author: ${{ github.actor }}"
          echo ""
          echo "  Next Steps:"
          echo "  1. Review artifacts in GitHub Actions"
          echo "  2. Download release binaries"
          echo "  3. Deploy to your infrastructure"
          echo ""
          echo "============================================"

# End of CI/CD Pipeline
